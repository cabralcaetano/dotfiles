# === Fonte ===
font_family      JetBrainsMono Nerd Font
font_size        13.0

# === Tema ===
include current-theme.conf

# === Transparência ===
background_opacity 0.85
background_blur    0

# === Janela ===
window_padding_width  8 12

# === Cursor ===
cursor_shape      beam
cursor_blink_interval 0.5

# === Scrollback ===
scrollback_lines  10000

# === Wayland ===
linux_display_server wayland
