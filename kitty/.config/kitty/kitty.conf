# === Fonte ===
font_family      JetBrainsMono Nerd Font
font_size        13.0

# === Tema ===
include current-theme.conf

# === Transparência ===
background_opacity 0.85
background_blur    0

# === Janela ===
window_padding_width  8 12

# === Cursor ===
cursor_shape      beam
cursor_blink_interval 0.5

# === Scrollback ===
scrollback_lines  10000

# === Wayland ===
linux_display_server wayland

map shift+up    send_text all \x1b[1;2A
map shift+down  send_text all \x1b[1;2B
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# === Teclado moderno ===
kitty_mod ctrl+shift
map shift+left  no-op
map shift+right no-op
modify_font_size  0

# === Protocolo de teclado ===
forward_stdio_to_child no

echo "" >> ~/.config/kitty/kitty.conf
